{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      scroll-behavior: smooth;
    }

    body {
      background-color: #eaf6f9;
    }

    h1 {
      text-align: center;
      margin-top: 40px;
      color: #2c3e50;
      font-size: 4rem;
      font-weight: 600;
    }

    /* Container Section */
    .container {
      display: flex;
      width: 70%;
      height: 500px;
      margin: 50px auto; 
      background-color: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      border: 5px solid #1abc9c;
    }

    /* Sidebar Section */
    .sidebar {
      width: 35%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .sidebar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Content Section */
    .content {
      width: 65%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px;
      overflow-y: auto;
      scrollbar-width: thin;
      font-size: 1.8rem;
      line-height: 2.8rem;
    }

    .section {
      text-align: left;
      animation: fade-in 1s ease-in-out;
    }

    .section h4 {
      margin-bottom: 30px;
      color: #1abc9c;
      font-size: 3rem;
    }

    .section p {
      color: #34495e;
      margin-bottom: 15px;
    }

    /* Animation */
    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    footer {
      background-color: #34495e;
      color: #ffffff;
      text-align: center;
      padding: 20px;
      width: 100%;
    }

    footer p {
      margin: 0;
      font-size: 16px;
    }

    footer a {
      color: #1abc9c;
      text-decoration: none;
      font-weight: bold;
      margin: 0 10px;
    }

    footer a:hover {
      color: #ffffff;
    }
  </style>
</head>
<body>

  <!-- Title Header -->
  <h1>Profile Page</h1>

  <!-- Container Section -->
  <div class="container">
    <!-- Sidebar Section -->
    <div class="sidebar">
      <img src="{% static 'jake.jpeg' %}" alt="Profile Picture">
    </div>

    <!-- Content Section -->
    <div class="content">
      <div class="section">
        <h4>Information</h4>
        {% if user %}
          <p><strong>ROLLNO:</strong> {{ user.name }}</p>
          <p><strong>COURSE:</strong> {{ course_name }}</p>
          <p><strong>EMAIL:</strong> {{ user.mail }}</p>
        {% else %}
          <p>User not logged in or details not found.</p>
        {% endif %}
      </div>
    </div>
  </div>

<footer>
    <p>&copy; EXAM HUB All Rights Reserved. | 
    <a href="#">Privacy Policy</a> | 
    <a href="#">Contact Us</a>
    </p>
</footer>

</body>
</html>
