{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    body, html {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #071b35;
    }

    .login-container {
      width: 400px;
      padding: 40px;
      background-color: #89c2d9;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    h2 {
      color: #071b35;
      margin-bottom: 30px;
      font-size: 2rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #5a9fbf;
      outline: none;
      font-size: 1rem;
      box-sizing: border-box;
    }

    input:focus {
      border-color: #071b35;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: background-color 0.3s;
      margin-top: 10px;
    }

    .login-btn {
      background-color: #071b35;
      color: white;
    }

    .login-btn:hover {
      background-color: #0a2a4d;
    }

    .signup-link {
      margin-top: 20px;
      color: #071b35;
    }

    .signup-link a {
      color: #071b35;
      font-weight: 600;
      text-decoration: underline;
    }

    .teacher-link {
      margin-top: 15px;
      font-size: 0.9rem;
      color: #071b35;
    }

    .teacher-link a {
      color: #071b35;
      text-decoration: underline;
    }

    .error {
      color: #d32f2f;
      background-color: #ffcdd2;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 15px;
    }

    .success {
      color: #2e7d32;
      background-color: #c8e6c9;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Student Login</h2>
    
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    
    {% if success %}
      <div class="success">{{ success }}</div>
    {% endif %}
    
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <input type="text" name="username" placeholder="Username (e.g., 23pw01)" required />
      </div>
      <div class="form-group">
        <input type="password" name="password" placeholder="Password" required />
      </div>
      <button type="submit" class="login-btn">Login</button>
    </form>
    
    <div class="signup-link">
      New student? <a href="{% url 'student_register' %}">Sign Up</a>
    </div>
    
    <div class="teacher-link">
      Are you a teacher? <a href="{% url 'teacher_login' %}">Teacher Login</a>
    </div>
  </div>
</body>
</html>
