  <style>
    body, html {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    .container, .login-container {
      width: 50vw;
      height: 50vh;
      display: flex;
      position: absolute;
      top: 0;
      left: 0;
      transition: transform 0.6s ease;
    }
    .selection-box {
      flex: 1;
      display: flex;
      position: center;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-size: 5rem;
      font-weight: 600;
      transition: transform 0.5s ease;
    }
  </style>
</head>
<body>
  <!-- Role Selection Screen -->
  <div class="container" id="roleSelection">
    <div class="selection-box student" onclick="showLogin('student')">STUDENT</div>
    <div class="selection-box teacher" onclick="showLogin('teacher')">TEACHER</div>
  </div>

  <!-- Login Screen -->
  <div class="login-container" id="loginContainer">
    <div class="role-section" id="roleSection"></div>
    <div class="form-section" id="formSection">
      <h2 id="welcomeText">Welcome!</h2>
      <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Login</button>
        <button type="button" class="back-button" onclick="goBack()">Back</button>
      </form>
    </div>
  </div>

  <script>
    function showLogin(role) {
      const loginContainer = document.getElementById('loginContainer');
      const roleSelection = document.getElementById('roleSelection');
      const roleSection = document.getElementById('roleSection');
      const welcomeText = document.getElementById('welcomeText');
      const formSection = document.getElementById('formSection');

      // Slide effect
      roleSelection.style.transform = 'translateX(-100%)';
      loginContainer.style.transform = 'translateX(0)';

      // Role-based Customization
      if (role === 'student') {
        roleSection.textContent = 'Student';
        roleSection.style.backgroundColor = '#071b35';
        roleSection.style.color = '#ffffff';
        welcomeText.textContent = 'Welcome, Student!';
        formSection.className = 'form-section student-form';
      } else {
        roleSection.textContent = 'Teacher';
        roleSection.style.backgroundColor = '#89c2d9';
        roleSection.style.color = '#071b35';
        welcomeText.textContent = 'Welcome, Teacher!';
        formSection.className = 'form-section teacher-form';
      }
    }

    function goBack() {
      document.getElementById('roleSelection').style.transform = 'translateX(0)';
      document.getElementById('loginContainer').style.transform = 'translateX(100%)';
    }
  </script>
</body>
